# Servidor
server.port=${PORT:8088}

# Base de datos desarrollo (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# App
spring.application.name=portfolio-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Resend email API
resend.api-key=${RESEND_API_KEY:test-key}
resend.from=Portfolio <noreply@stacklab.online>